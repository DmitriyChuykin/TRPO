<!DOCTYPE html>
<html>
<head>
    <title>Пополнение баланса</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
        }
        h1 { margin-top: 0; font-weight: 400; color: white; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .balance-info {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            border-left: 4px solid #3f51b5;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: #121212;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #3f51b5; }
        button {
            background-color: #4caf50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 600;
        }
        button:hover { background-color: #388e3c; }
        .message { padding: 10px; margin-bottom: 15px; border-radius: 4px; font-size: 0.9em; }
        .message.error { background-color: rgba(207, 102, 121, 0.2); color: #cf6679; border: 1px solid #cf6679; }
        .message.success { background-color: rgba(76, 175, 80, 0.2); color: #81c784; border: 1px solid #4caf50; }
        .nav-links { margin-top: 25px; text-align: center; border-top: 1px solid #333; padding-top: 15px; }
        a { color: #82b1ff; text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        a:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Финансы</h1>

        <div class="balance-info">
            Текущий баланс: <strong style="color: #fff; font-size: 1.2em;">{{ balance }} руб.</strong>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="amount" style="color: #aaa; font-size: 0.9em;">Сумма пополнения (RUB)</label>
            <input type="number" id="amount" name="amount" min="1" step="0.01" placeholder="0.00" required>

            <button type="submit">Пополнить счет</button>
        </form>

        <div class="nav-links">
            <a href="{% url 'profile' %}">Личный кабинет</a>
            <a href="/">Главная страница</a>
        </div>
    </div>
</body>
</html>

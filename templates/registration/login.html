<!DOCTYPE html>
<html>
<head>
    <title>Вход в систему</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 500;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #aaaaaa;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #3f51b5;
        }
        button {
            background-color: #3f51b5;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.3s;
        }
        button:hover { background-color: #303f9f; }
        .error {
            background-color: rgba(207, 102, 121, 0.1);
            color: #cf6679;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #cf6679;
            font-size: 0.9em;
            text-align: center;
        }
        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9em;
        }
        .links a {
            color: #82b1ff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }
        .links a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Авторизация</h2>

        {% if form.errors %}
            <div class="error">
                Неверное имя пользователя или пароль.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Войти</button>
        </form>

        <div class="links">
            <a href="/">На главную</a>
            <span style="color: #444">|</span>
            <a href="/admin/">Администратор</a>
        </div>
    </div>
</body>
</html>

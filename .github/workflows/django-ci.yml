name: Django CI

# Указываем, когда запускать проверки:
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    # 1. Копируем код из репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python 3.12 (как в твоем проекте)
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Ускоряет установку зависимостей

    # 3. Устанавливаем зависимости
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Проверяем проект на синтаксические/системные ошибки Django
    - name: Check Django setup
      run: |
        python manage.py check

    # 5. Выполняем миграции (в памяти, для тестов)
    - name: Run migrations
      run: |
        python manage.py migrate

    # 6. Запускаем тесты!
    - name: Run tests
      run: |
        python manage.py test
